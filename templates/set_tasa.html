{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow border-0" style="border-radius: 15px;">
        <div class="card-header bg-dark text-white text-center p-3" style="border-radius: 15px 15px 0 0;">
          <h4 class="mb-0"><i class="fas fa-university me-2"></i> Registrar Tasa BCV</h4>
        </div>
        <div class="card-body p-4">
          <!-- 🚨 FORZAMOS EL POST CON ACTION EXPLÍCITO -->
          <form action="/set_tasa_bcv" method="POST" id="formTasa">
            <div class="mb-4">
              <label class="form-label fw-bold text-muted">Fecha de Hoy:</label>
              <input type="text" class="form-control bg-light border-0" value="{{ fecha }}" readonly
                name="fecha_display">
            </div>

            <div class="mb-4">
              <label for="valor" class="form-label fw-bold">Tasa BCV (Bs. por $1):</label>
              <div class="input-group input-group-lg">
                <span class="input-group-text bg-primary text-white border-0">Bs.</span>
                <input type="number" step="0.01" name="valor" id="valor" class="form-control border-primary"
                  placeholder="Ej: 70.50" required autofocus>
              </div>
              <small class="text-muted mt-2 d-block">Ingrese el valor oficial del BCV para hoy.</small>
            </div>

            <div class="d-grid gap-2">
              <!-- 🚨 BOTÓN TIPO SUBMIT DENTRO DEL FORM -->
              <button type="submit" class="btn btn-primary btn-lg shadow-sm fw-bold py-3" style="border-radius: 10px;">
                <i class="fas fa-save me-2"></i> GUARDAR TASA Y CONTINUAR
              </button>

              <a href="/" class="btn btn-link text-decoration-none text-muted mt-2">Cancelar y volver</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Script para asegurar que el formulario se envíe -->
<script>
  document.getElementById('formTasa').onsubmit = function () {
    console.log("Enviando tasa...");
    return true;
  };
</script>
{% endblock %}
