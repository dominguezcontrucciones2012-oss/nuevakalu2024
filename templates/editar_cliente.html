{% extends 'base.html' %} {% block content %}

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow border-0">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0 fw-bold">
            <i class="fas fa-user-edit"></i> EDITAR CLIENTE
          </h4>
        </div>
        <div class="card-body">
          <form action="/actualizar_cliente/{{ cliente.id }}" method="POST">
            <!-- NOMBRE -->
            <div class="mb-3">
              <label class="form-label fw-bold">Nombre Completo:</label>
              <input
                type="text"
                name="nombre"
                class="form-control"
                value="{{ cliente.nombre }}"
                required
              />
            </div>

            <!-- CÉDULA -->
            <div class="mb-3">
              <label class="form-label fw-bold">Cédula / RIF:</label>
              <input
                type="text"
                name="cedula"
                class="form-control"
                value="{{ cliente.cedula }}"
                required
              />
            </div>

            <!-- TELÉFONO -->
            <div class="mb-3">
              <label class="form-label fw-bold">Teléfono:</label>
              <input
                type="text"
                name="telefono"
                class="form-control"
                value="{{ cliente.telefono or '' }}"
              />
            </div>

            <!-- DIRECCIÓN -->
            <div class="mb-3">
              <label class="form-label fw-bold">Dirección:</label>
              <textarea name="direccion" class="form-control" rows="2">
{{ cliente.direccion or '' }}</textarea
              >
            </div>

            <!-- FECHA DE NACIMIENTO -->
            <div class="mb-3">
              <label class="form-label fw-bold">Fecha de Nacimiento:</label>
              <input
                type="date"
                name="fecha_nacimiento"
                class="form-control"
                value="{{ cliente.fecha_nacimiento or '' }}"
              />
            </div>

            <!-- BOTONES -->
            <div class="d-flex justify-content-between mt-4">
              <a href="/clientes" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Cancelar
              </a>
              <button type="submit" class="btn btn-primary px-4 fw-bold">
                <i class="fas fa-save"></i> GUARDAR CAMBIOS
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
