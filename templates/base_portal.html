<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}KALU APP{% endblock %}</title>
    {% if manifest_exists %}
    <link rel="manifest" href="/static/manifest.json">
    {% endif %}
    <meta name="theme-color" content="#075E54">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='app_portal.css') }}">
</head>

<body>

    <!-- HEADER WHATSAPP STYLE -->
    <div class="top-nav">
        <div class="logo">
            <i class="fas fa-store"></i> KALU
        </div>
        <div style="display:flex; align-items:center; gap:18px;">
            <a href="{{ url_for('portal.mi_perfil') }}" style="color:rgba(255,255,255,0.8); font-size:22px;">
                <i class="fas fa-user-circle"></i>
            </a>
            <a href="{{ url_for('auth.logout') }}" style="color:#f15c6d; font-size:22px;">
                <i class="fas fa-sign-out-alt"></i>
            </a>
        </div>
    </div>

    <div class="app-container safe-area-bottom">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash-msg flash-{{ 'success' if category == 'success' else 'danger' }} animate-in">
            <i class="fas fa-{{ 'check-circle' if category == 'success' else 'exclamation-circle' }}"></i>
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <!-- BOTTOM NAV ESTILO WHATSAPP -->
    <nav class="bottom-nav">
        <a href="{{ url_for('portal.mi_deuda') }}"
            class="nav-item {% if request.endpoint == 'portal.mi_deuda' %}active{% endif %}">
            <i class="fas fa-chart-pie"></i>
            <span>Inicio</span>
        </a>
        <a href="#" onclick="event.preventDefault(); window.abrirCatalogo && window.abrirCatalogo();" class="nav-item">
            <i class="fas fa-store"></i>
            <span>Tienda</span>
        </a>
        <a href="#pagar"
            onclick="event.preventDefault(); document.getElementById('seccion-pagar')?.scrollIntoView({behavior:'smooth'});"
            class="nav-item">
            <i class="fas fa-paper-plane"></i>
            <span>Pagar</span>
        </a>
        <a href="{{ url_for('portal.mi_perfil') }}"
            class="nav-item {% if request.endpoint == 'portal.mi_perfil' %}active{% endif %}">
            <i class="fas fa-cog"></i>
            <span>Perfil</span>
        </a>
    </nav>

    <script>
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(8);
            });
        });
    </script>
</body>

</html>
