<!-- prettier-ignore -->
{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
  <div class="card shadow border-0">
    <div class="card-header bg-warning text-dark fw-bold">
      <i class="fas fa-edit"></i> CORREGIR PRODUCTO: {{ p.nombre }}
    </div>
    <form action="{{ url_for('inventario.editar_producto', id=p.id) }}" method="POST">
      <div class="card-body">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Código</label>
            <input type="text" name="codigo" class="form-control" value="{{ p.codigo }}" required />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Nombre del Producto</label>
            <input type="text" name="nombre" class="form-control" value="{{ p.nombre }}" required />
          </div>
        </div>

        <div class="row">
          <div class="col-md-12 mb-3">
            <label class="form-label fw-bold">Categoría</label>
            <select name="categoria" class="form-select fw-bold">
              {% for cat in categorias %}
              <option value="{{ cat }}" {%if p.categoria==cat%}selected{%endif %}>
                {{ cat }}
              </option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label fw-bold text-danger">Costo ($)</label>
            <input type="number" step="0.01" name="costo_usd" class="form-control" value="{{ p.costo_usd }}" required />
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label fw-bold text-primary">Precio Full ($)</label>
            <input type="number" step="0.01" name="precio_normal_usd" class="form-control"
              value="{{ p.precio_normal_usd }}" required />
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label fw-bold text-success">Precio Oferta ($)</label>
            <input type="number" step="0.01" name="precio_oferta_usd" class="form-control"
              value="{{ p.precio_oferta_usd }}" required />
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Stock Actual</label>
            <input type="number" step="0.001" name="stock" class="form-control" value="{{ p.stock }}" required />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Stock Mínimo</label>
            <input type="number" step="0.001" name="stock_minimo" class="form-control" value="{{ p.stock_minimo }}"
              required />
          </div>
        </div>
      </div>
      <div class="card-footer bg-light d-flex justify-content-between">
        <a href="{{ url_for('inventario.lista_inventario') }}" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-warning fw-bold">
          <i class="fas fa-save"></i> GUARDAR CAMBIOS
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
