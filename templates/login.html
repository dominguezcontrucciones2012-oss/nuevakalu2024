<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALU 2.0 - Acceso al Sistema</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        body {
            background: url('/static/fondo_negocio_jpg.png') no-repeat center center fixed !important;
            background-size: cover !important;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }

        .login-card {
            width: 90%;
            max-width: 440px;
            padding: 50px 40px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            background: rgba(255, 255, 255, 0.08) !important;
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            color: white;
            text-align: center;
        }

        .brand-title {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: #3498db;
            text-shadow: 0 0 20px rgba(52, 152, 219, 0.4);
            margin-bottom: 5px;
        }

        .brand-subtitle {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            padding: 12px 15px;
            transition: 0.3s;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #3498db;
            color: white;
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.2);
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.8);
            text-align: left;
            display: block;
            margin-left: 5px;
        }

        .btn-kalu {
            background: #3498db;
            color: white;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 14px;
            border: none;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-kalu:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
            color: white;
        }

        .alert {
            border-radius: 12px;
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #ff7675;
            font-size: 0.85rem;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h1 class="brand-title">KALU 2.0</h1>
        <p class="brand-subtitle">Administración de Negocios</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label text-uppercase">Nombre de Usuario</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-0 text-white-50"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Ej: admin" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label text-uppercase">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-0 text-white-50"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-kalu w-100 shadow">
                <i class="fas fa-sign-in-alt me-2"></i> Iniciar Sesión
            </button>
        </form>
    </div>
</body>

</html>
